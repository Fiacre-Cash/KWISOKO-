version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kwisoko_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kwisoko
      POSTGRES_PASSWORD: kwisoko_pass
      POSTGRES_DB: kwisoko
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kwisoko_api
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: postgresql://kwisoko:kwisoko_pass@postgres:5432/kwisoko
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kwisoko_web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
